<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>設備・技術サービス診断 | MergeVision</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --teal: #1D9E75; --teal-dark: #0F6E56; --teal-deep: #0A2A35;
  --teal-light: #E1F5EE; --teal-border: #9FE1CB;
  --blue: #185FA5; --blue-light: #E6F1FB;
  --amber: #BA7517; --amber-light: #FAEEDA;
  --purple: #5B2D8E; --purple-light: #F3EEFF;
  --yellow: #7B4F00; --yellow-light: #FFF8E1;
  --green: #1B5E20; --green-light: #E8F5E9;
  --text: #1a2e35; --text-mid: #3a5560; --text-muted: #7A9CA8;
  --bg: #f8fafa; --surface: #ffffff;
  --border: rgba(0,0,0,0.1); --radius: 10px; --radius-lg: 16px;
}
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.container { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
.screen { display: none; }
.screen.active { display: block; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; }

/* ── Header */
.site-header { background: var(--teal-deep); padding: 14px 1rem; }
.site-header-inner { max-width: 680px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
.site-logo { color: #fff; font-size: 15px; font-weight: 700; letter-spacing: .5px; }
.site-logo span { color: var(--teal-border); }

/* ── Buttons */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 22px; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: all .15s; font-family: inherit; }
.btn-primary { background: var(--teal); color: #fff; border-color: var(--teal); }
.btn-primary:hover { background: var(--teal-dark); }
.btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border); }
.btn-secondary:hover { background: var(--bg); }
.btn-dark { background: var(--teal-deep); color: #fff; border-color: var(--teal-deep); }
.btn-dark:hover { background: var(--teal); border-color: var(--teal); }
.btn-lg { padding: 13px 32px; font-size: 15px; }
.btn:disabled { opacity: .4; cursor: default; pointer-events: none; }

/* ── Form */
.field { margin-bottom: 1rem; }
.field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 5px; }
.field input { width: 100%; padding: 10px 13px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; font-family: inherit; background: var(--surface); color: var(--text); transition: border-color .15s; }
.field input:focus { outline: none; border-color: var(--teal); }
.err-msg { font-size: 12px; color: #E24B4A; margin-top: 5px; }

/* ── Progress */
.progress-wrap { margin-bottom: 1.5rem; }
.progress-bar { height: 4px; background: #dde8e8; border-radius: 2px; }
.progress-fill { height: 4px; background: var(--teal); border-radius: 2px; transition: width .4s ease; }
.progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-top: 5px; }

/* ── Wizard */
.cat-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; color: var(--teal-dark); background: var(--teal-light); padding: 3px 11px; border-radius: 20px; margin-bottom: .875rem; }
.q-text { font-size: 16px; font-weight: 500; line-height: 1.65; margin-bottom: 1.25rem; color: var(--text); }
.q-sub { font-size: 12px; color: var(--text-muted); margin-top: -.75rem; margin-bottom: 1.25rem; line-height: 1.6; padding: 8px 12px; background: var(--bg); border-radius: 8px; border-left: 3px solid var(--teal-border); }
.choices { display: flex; flex-direction: column; gap: 9px; margin-bottom: 1.5rem; }
.choice-btn { text-align: left; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); font-size: 14px; cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 11px; font-family: inherit; line-height: 1.5; width: 100%; }
.choice-btn:hover { border-color: var(--teal); background: var(--teal-light); }
.choice-btn.selected { border-color: var(--teal); background: var(--teal-light); border-width: 1.5px; }
.choice-dot { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid #ccc; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.choice-btn.selected .choice-dot { background: var(--teal); border-color: var(--teal); }
.choice-btn.selected .choice-dot::after { content: ''; display: block; width: 7px; height: 7px; border-radius: 50%; background: #fff; }
.choice-icon { font-size: 20px; flex-shrink: 0; width: 28px; text-align: center; }
.choice-main { font-size: 14px; font-weight: 500; color: var(--text); }
.choice-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; line-height: 1.5; }
.nav-row { display: flex; justify-content: space-between; align-items: center; }

/* ── Result */
.result-label { display: inline-block; font-size: 11px; padding: 3px 12px; border-radius: 20px; background: var(--teal-light); color: var(--teal-dark); font-weight: 500; margin-bottom: 10px; }
.result-h { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.result-company { font-size: 13px; color: var(--text-muted); margin-bottom: 1.5rem; }
.svc-cards { display: flex; flex-direction: column; gap: 12px; margin-bottom: 1.5rem; }
.svc-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; }
.svc-card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.svc-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.svc-title { font-size: 14px; font-weight: 700; color: var(--text); }
.svc-body { font-size: 13px; color: var(--text-mid); line-height: 1.7; margin-bottom: 8px; }
.svc-evidence { font-size: 12px; color: var(--teal-dark); background: var(--teal-light); padding: 8px 11px; border-radius: 8px; line-height: 1.6; }
.cta-box { background: var(--teal-light); border: 1px solid var(--teal-border); border-radius: var(--radius-lg); padding: 1.5rem; text-align: center; margin-bottom: 1.5rem; }
.cta-box h3 { font-size: 16px; font-weight: 700; color: var(--teal-deep); margin-bottom: 6px; }
.cta-box p { font-size: 13px; color: var(--teal-dark); line-height: 1.65; }

/* ── Admin */
.admin-container { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
.admin-header { background: var(--teal-deep); color: #fff; padding: 14px 16px; border-radius: var(--radius-lg) var(--radius-lg) 0 0; display: flex; align-items: center; justify-content: space-between; margin: -1.5rem -1.5rem 1.5rem; }
.admin-header h2 { font-size: 15px; font-weight: 700; }
.stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 1.5rem; }
.stat-card { background: var(--bg); border-radius: var(--radius); padding: .875rem; text-align: center; }
.stat-num { font-size: 26px; font-weight: 700; }
.stat-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.table-wrap { overflow-x: auto; }
table.results-tbl { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 640px; }
table.results-tbl th { background: var(--bg); padding: 7px 10px; text-align: left; font-weight: 500; color: var(--text-muted); font-size: 11px; border-bottom: 1px solid var(--border); white-space: nowrap; }
table.results-tbl td { padding: 9px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
table.results-tbl tr:last-child td { border-bottom: none; }
table.results-tbl tr:hover td { background: var(--bg); }
.pill { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 500; white-space: nowrap; margin: 1px; }
.pill-teal   { background: var(--teal-light);   color: var(--teal-dark); }
.pill-blue   { background: var(--blue-light);   color: var(--blue); }
.pill-amber  { background: var(--amber-light);  color: var(--amber); }
.pill-purple { background: var(--purple-light); color: var(--purple); }
.pill-yellow { background: var(--yellow-light); color: var(--yellow); }
.pill-green  { background: var(--green-light);  color: var(--green); }
.pill-gray   { background: #F1EFE8; color: #5F5E5A; }

/* ── Utils */
.loading { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 2rem; color: var(--text-muted); font-size: 14px; }
.spinner { width: 18px; height: 18px; border: 2px solid var(--teal-border); border-top-color: var(--teal); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.flex-row { display: flex; gap: 8px; align-items: center; }
.flex-center { justify-content: center; }
.flex-wrap { flex-wrap: wrap; }
.text-center { text-align: center; }
.mt-2 { margin-top: 1.25rem; }
.saved-note { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 8px; }

/* 管理画面のときはcontainerを広くする */
body.is-admin .container { max-width: 960px; }
body.is-admin .site-header-inner { max-width: 960px; }

@media (max-width: 600px) {
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .btn-lg { padding: 12px 24px; font-size: 14px; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <div class="site-logo" id="header-logo">MergeVision <span>設備・技術サービス診断</span></div>
    <button class="btn btn-secondary" style="font-size:12px;padding:5px 12px" id="header-btn" onclick="showAdminLogin()">🔒 管理画面</button>
  </div>
</header>

<div class="container" id="main-container">

  <!-- START -->
  <div id="sc-entry" class="screen active">
    <div class="text-center" style="padding:1.5rem 0 1.25rem">
      <div style="width:56px;height:56px;background:var(--teal-light);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:28px">⚙️</div>
      <h1 style="font-size:22px;font-weight:700;margin-bottom:.5rem">「こんなこと、頼める人いないかな…」</h1>
      <p style="font-size:14px;color:var(--text-muted);line-height:1.7">3〜4問に答えるだけで、お役に立てるサービスをご提案します。<br>ヒアリング・お見積りは無料です。</p>
    </div>
    <div class="card">
      <p style="font-size:14px;font-weight:700;margin-bottom:1rem">まず簡単に教えてください</p>
      <div class="field">
        <label>会社名 <span style="color:#E24B4A">*</span></label>
        <input type="text" id="f-company" placeholder="例：株式会社〇〇製作所" maxlength="80" autocomplete="organization">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="field">
          <label>従業員数 <span style="color:#E24B4A">*</span></label>
          <select id="f-size" style="width:100%;padding:10px 13px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:inherit;background:var(--surface);color:var(--text);outline:none">
            <option value="">選択してください</option>
            <option value="1-10">1〜10名</option>
            <option value="11-30">11〜30名</option>
            <option value="31-100">31〜100名</option>
            <option value="101+">101名以上</option>
          </select>
        </div>
        <div class="field">
          <label>業種 <span style="color:#E24B4A">*</span></label>
          <select id="f-industry" style="width:100%;padding:10px 13px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:inherit;background:var(--surface);color:var(--text);outline:none">
            <option value="">選択してください</option>
            <option value="製造">製造</option>
            <option value="IT・通信">IT・通信</option>
            <option value="小売・流通">小売・流通</option>
            <option value="医療・福祉">医療・福祉</option>
            <option value="建設">建設</option>
            <option value="サービス">サービス</option>
            <option value="その他">その他</option>
          </select>
        </div>
      </div>
      <p id="entry-err" class="err-msg" style="display:none;margin-bottom:.75rem"></p>
      <button class="btn btn-primary btn-lg" style="width:100%;justify-content:center" onclick="entryNext()">診断をはじめる →</button>
    </div>
  </div>

  <!-- WIZARD -->
  <div id="sc-wizard" class="screen">
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
      <div class="progress-label"><span id="prog-label"></span><span id="prog-pct"></span></div>
    </div>
    <div class="card">
      <div class="cat-pill" id="q-cat"></div>
      <p class="q-text" id="q-text"></p>
      <p class="q-sub" id="q-sub" style="display:none"></p>
      <div class="choices" id="q-choices"></div>
    </div>
    <div class="nav-row" style="margin-top:1rem">
      <button class="btn btn-secondary" id="btn-back" onclick="wizBack()">← 戻る</button>
      <button class="btn btn-primary" id="btn-next" onclick="wizNext()" disabled>次へ →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="sc-result" class="screen">
    <span class="result-label">診断結果</span>
    <div class="result-h">こんなサービスが提供できます</div>
    <div class="result-company" id="result-company"></div>
    <div class="svc-cards" id="svc-cards"></div>
    <div class="cta-box">
      <h3>「こんなこと、できる？」で大丈夫です。まずはご相談を。</h3>
      <p>お見積り・ヒアリングは無料です。どのご相談でも同じ窓口でOKです。</p>
    </div>
    <div class="flex-row flex-center flex-wrap" style="margin-bottom:.75rem">
      <button class="btn btn-dark btn-lg" id="btn-pdf" onclick="savePDF()">📄 PDFで保存</button>
      <button class="btn btn-secondary" onclick="restart()">もう一度診断する</button>
    </div>
    <p class="saved-note" id="saved-note"></p>
  </div>

  <!-- ADMIN LOGIN -->
  <div id="sc-admin-login" class="screen">
    <div class="card" style="max-width:360px;margin:2rem auto">
      <p style="font-size:16px;font-weight:700;margin-bottom:1.25rem">🔒 管理画面ログイン</p>
      <div class="field">
        <label>パスワード</label>
        <input type="password" id="admin-pw" placeholder="管理者パスワード" onkeydown="if(event.key==='Enter')adminLogin()">
      </div>
      <p id="admin-err" class="err-msg" style="display:none">パスワードが違います</p>
      <div class="flex-row mt-2">
        <button class="btn btn-secondary" onclick="showScreen('sc-entry');exitAdmin()">← 戻る</button>
        <button class="btn btn-primary" onclick="adminLogin()">ログイン</button>
      </div>
    </div>
  </div>

  <!-- ADMIN DASHBOARD -->
  <div id="sc-admin" class="screen">
    <div class="card">
      <div class="admin-header">
        <h2>📊 診断履歴管理</h2>
        <div class="flex-row">
          <button class="btn btn-secondary" style="font-size:12px;padding:5px 12px" onclick="exportCSV()">CSV出力</button>
          <button class="btn btn-secondary" style="font-size:12px;padding:5px 12px" onclick="adminLogout()">ログアウト</button>
        </div>
      </div>
      <div id="admin-loading" class="loading"><div class="spinner"></div>読み込み中...</div>
      <div id="admin-content" style="display:none">
        <div class="stats-grid" id="admin-stats"></div>
        <div class="table-wrap">
          <table class="results-tbl">
            <thead><tr>
              <th>日時</th><th>会社名</th><th>従業員数</th><th>業種</th><th>お困りごと</th><th>詳細</th><th>規模</th><th>提案サービス</th>
            </tr></thead>
            <tbody id="admin-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

</div><!-- /container -->

<script>
// ════════════════════════════
// QUESTIONS & SERVICES（省略なし）
// ════════════════════════════
const QUESTIONS = [
  { id:'situation', cat:'質問 1', text:'現在、どんな状況で困っていますか？', sub:'当てはまるものをひとつ選んでください',
    choices:[
      { val:'automation', icon:'⚙️',  main:'自動化・省力化したい',              desc:'手作業が多い、人手が足りない、繰り返し作業をなんとかしたい' },
      { val:'drawing',    icon:'📄',  main:'図面まわりで困っている',             desc:'紙図面しかない、古い、管理できていない、3Dデータがない' },
      { val:'optical',    icon:'🔭',  main:'光学・精密設計の相談をしたい',       desc:'光学系の設計・見直し、HUD/AR/照明光学系、シミュレーションなど' },
      { val:'electrical', icon:'⚡',  main:'電気回路・基板設計の相談をしたい',   desc:'回路設計、FPC設計、EMI対策、電源設計、デバッグ検証など' },
      { val:'production', icon:'🏭',  main:'生産ライン・製品設計の相談をしたい', desc:'ライン構築、工数削減、不良低減、製品設計、解析シミュレーションなど' },
      { val:'repair',     icon:'🔧',  main:'古い設備を直したい・改造したい',     desc:'壊れた、老朽化した、図面も資料もない設備をなんとかしたい' },
      { val:'consult',    icon:'💬',  main:'何から手をつければいいかわからない', desc:'課題はあるが整理できていない、まず相談したい' },
    ]
  },
  { id:'drawing_detail', cond:{situation:'drawing'}, cat:'質問 2', text:'図面はどんな状態ですか？', sub:'現在の状況を教えてください',
    choices:[
      { val:'paper',   icon:'📦', main:'紙の図面しかない',             desc:'紙図面が棚に積まれている、スキャンもしていない' },
      { val:'2dto3d',  icon:'🧊', main:'2D図面はあるが3Dデータがない',  desc:'CADデータはあるが平面のみ、3Dモデルが欲しい' },
      { val:'manage',  icon:'🗂', main:'図面が多すぎて管理できていない', desc:'どこに何があるか分からない、バラバラに保管されている' },
      { val:'reverse', icon:'🔍', main:'現物はあるが図面が存在しない',  desc:'設備や部品はあるが、図面が作られていない・紛失した' },
    ]
  },
  { id:'automation_detail', cond:{situation:'automation'}, cat:'質問 2', text:'自動化したい作業は、どんな内容ですか？', sub:'近い内容を選んでください',
    choices:[
      { val:'transfer',   icon:'🚛', main:'搬送・移動の作業',             desc:'部品や製品を運ぶ、並べる、仕分けるなどの繰り返し作業' },
      { val:'inspection', icon:'🔬', main:'測定・検査の作業',             desc:'品質チェック、寸法測定、調整など精度が必要な工程' },
      { val:'assembly',   icon:'🔩', main:'加工・組み立ての作業',         desc:'ネジ締め、圧入、接着、はんだ付けなど製造工程' },
      { val:'undecided',  icon:'💭', main:'まだ決まっていない・相談したい',desc:'どこから自動化するか検討段階、一緒に考えてほしい' },
    ]
  },
  { id:'optical_detail', cond:{situation:'optical'}, cat:'質問 2', text:'光学・精密設計で、どんな内容ですか？', sub:'近い内容を選んでください',
    choices:[
      { val:'optical_new',     icon:'💡', main:'新規の光学系を設計したい', desc:'照明・投射・導光など、光学系を一から設計してほしい' },
      { val:'optical_review',  icon:'🔎', main:'既存の光学系を見直したい', desc:'性能が出ない、改善したい、シミュレーションで確認したい' },
      { val:'optical_hud',     icon:'🥽', main:'HUD・ARグラス関連',        desc:'車載HUD、ARグラス向けの光学エンジン・導光板設計など' },
      { val:'optical_consult', icon:'💬', main:'まず相談したい',            desc:'光学設計が必要かどうかも含めて聞いてほしい' },
    ]
  },
  { id:'electrical_detail', cond:{situation:'electrical'}, cat:'質問 2', text:'電気回路・基板設計で、どんな内容ですか？', sub:'近い内容を選んでください',
    choices:[

function visibleSteps(){
  return QUESTIONS.filter(q=>{
    if(q.cond&&!Object.entries(q.cond).every(([k,v])=>answers[k]===v))return false;
    if(q.cond_not){for(const[k,v]of Object.entries(q.cond_not)){const vals=Array.isArray(v)?v:[v];if(vals.includes(answers[k]))return false;}}
    return true;
  });
}
function currentQ(){return visibleSteps()[history.length]||null;}
function totalSteps(){

}

function renderWizard(){
  const q=currentQ();
  if(!q){showResult();return;}
  const done=history.length,total=totalSteps();
  const pct=Math.min(100,Math.round(done/total*100));
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent=`${q.cat} / ${total}`;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('q-cat').textContent=q.cat;
  document.getElementById('q-text').textContent=q.text;
  const subEl=document.getElementById('q-sub');
  if(q.sub){subEl.textContent=q.sub;subEl.style.display='block';}else{subEl.style.display='none';}
  const wrap=document.getElementById('q-choices');
  wrap.innerHTML='';
  q.choices.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.innerHTML=`<div class="choice-dot"></div><span class="choice-icon">${c.icon}</span><div><div class="choice-main">${c.main}</div><div class="choice-desc">${c.desc}</div></div>`;
    btn.onclick=()=>{
      document.querySelectorAll('.choice-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      answers[q.id]=c.val;
      document.getElementById('btn-next').disabled=false;
    };
    wrap.appendChild(btn);
  });
  const backBtn=document.getElementById('btn-back');
  backBtn.disabled=done===0;
  backBtn.style.visibility=done===0?'hidden':'visible';
  document.getElementById('btn-next').disabled=true;
}
function wizNext(){const q=currentQ();if(!q||!answers[q.id])return;history.push(q.id);document.getElementById('btn-next').disabled=true;renderWizard();}
function wizBack(){if(history.length===0)return;const prev=history.pop();delete answers[prev];renderWizard();}

// ── PDF
async function savePDF(){
  const btn=document.getElementById('btn-pdf');
  btn.disabled=true;btn.textContent='⏳ 生成中...';
  try{
    const el=document.getElementById('sc-result');
    const canvas=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#f8fafa',windowWidth:680,scrollX:0,scrollY:-window.scrollY});
    const{jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pw=210,ph=297,imgW=pw,imgH=canvas.height*(pw/canvas.width);
    if(imgH<=ph){
      pdf.addImage(canvas.toDataURL('image/jpeg',0.93),'JPEG',0,0,imgW,imgH);
    }else{
      let y=0;
      while(y<imgH){
        const srcY=y*canvas.width/imgW;
        const srcH=Math.min(ph*canvas.width/imgW,canvas.height-srcY);
        const pc=document.createElement('canvas');pc.width=canvas.width;pc.height=srcH;
        pc.getContext('2d').drawImage(canvas,0,srcY,canvas.width,srcH,0,0,canvas.width,srcH);
        if(y>0)pdf.addPage();
        pdf.addImage(pc.toDataURL('image/jpeg',0.93),'JPEG',0,0,imgW,srcH*imgW/canvas.width);
        y+=ph;
      }
    }
    pdf.save(company?`設備診断_${company}.pdf`:'設備診断結果.pdf');
  }catch(e){alert('PDF生成に失敗しました。');}
  finally{btn.disabled=false;btn.textContent='📄 PDFで保存';}
}

  document.getElementById('admin-content').style.display='none';
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/setsubi_shindan?order=created_at.desc&limit=300`,{
      headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
    });
    const rows=await res.json();
    adminRows=rows.map(r=>({
      datetime: r.created_at ? new Date(r.created_at).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '',
      company:   r.company_name||'',
      emp_size:  r.emp_size||'',
      industry:  r.industry||'',
      situation: r.situation||'',
      detail:    r.drawing_detail||r.automation_detail||r.optical_detail||r.electrical_detail||r.production_detail||'',
      scale:     r.scale||'',
      services:  r.services||'',
    }));
    renderAdminStats(adminRows);
    renderAdminTable(adminRows);
    document.getElementById('admin-loading').style.display='none';
    document.getElementById('admin-content').style.display='block';
  }catch(e){
    document.getElementById('admin-loading').innerHTML='<p style="color:#E24B4A">データ取得に失敗しました</p>';
  }
}

function renderAdminStats(rows){
  const counts={};rows.forEach(r=>{counts[r.situation]=(counts[r.situation]||0)+1;});
  const top=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
  const named=rows.filter(r=>r.company&&r.company!=='（未入力）').length;
  const weekAgo=new Date(Date.now()-7*24*60*60*1000);
  const thisWeek=rows.filter(r=>{
    if(!r.datetime)return false;
    const parts=r.datetime.split(' ');
    if(parts.length<1)return false;
    const md=parts[0].split('/');
    if(md.length<2)return false;
    const d=new Date(new Date().getFullYear(),parseInt(md[0])-1,parseInt(md[1]));
    return d>weekAgo;
  }).length;
  document.getElementById('admin-stats').innerHTML=`
    <div class="stat-card"><div class="stat-num">${rows.length}</div><div class="stat-lbl">総診断数</div></div>
    <div class="stat-card"><div class="stat-num">${thisWeek}</div><div class="stat-lbl">今週</div></div>
    <div class="stat-card"><div class="stat-num" style="font-size:14px;padding-top:8px">${top?(SIT_LABELS[top[0]]||top[0]):'—'}</div><div class="stat-lbl">最多お困りごと</div></div>
    <div class="stat-card"><div class="stat-num">${named}</div><div class="stat-lbl">会社名あり</div></div>`;
}

function renderAdminTable(rows){
  if(!rows.length){
    document.getElementById('admin-tbody').innerHTML='<tr><td colspan="6" style="text-align:center;padding:2rem;color:#7A9CA8">まだデータがありません</td></tr>';
    return;
  }
  document.getElementById('admin-tbody').innerHTML=rows.map(r=>{
    const svcs=(r.services||'').split(' / ').filter(Boolean);
    return`<tr>
      <td>${r.datetime||'—'}</td>
      <td>${esc(r.company||'—')}</td>
      <td>${esc(r.emp_size||'—')}</td>
      <td>${esc(r.industry||'—')}</td>
      <td><span class="pill ${SIT_PILL[r.situation]||'pill-gray'}">${SIT_LABELS[r.situation]||r.situation||'—'}</span></td>
      <td>${DET_LABELS[r.detail]||r.detail||'—'}</td>
      <td>${SCALE_LABELS[r.scale]||r.scale||'—'}</td>
      <td>${svcs.map(s=>`<span class="pill pill-teal">${esc(s)}</span>`).join('')}</td>
    </tr>`;
  }).join('');
}

function exportCSV(){
  if(!adminRows.length)return;
  const header=['日時','会社名','従業員数','業種','お困りごと','詳細','規模','提案サービス'];
  const rows=adminRows.map(r=>[
    r.datetime,r.company,r.emp_size||'',r.industry||'',
    SIT_LABELS[r.situation]||r.situation||'',
    DET_LABELS[r.detail]||r.detail||'',
    SCALE_LABELS[r.scale]||r.scale||'',
    r.services
  ].map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(','));
  const blob=new Blob(['\uFEFF'+[header.join(','),...rows].join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='設備診断履歴.csv';a.click();
}

function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
</script>
</body>
